# nginx site config for mcp.path2ai.tech
# Place at: /etc/nginx/conf.d/path-mcp.conf
# After certbot runs, it will update the SSL block automatically.

server {
    listen 80;
    server_name mcp.path2ai.tech;

    # Certbot will insert a redirect to HTTPS here.
    # Leave this block in place before running: sudo certbot --nginx -d mcp.path2ai.tech

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mcp.path2ai.tech;

    # SSL certificates — managed by certbot
    # ssl_certificate and ssl_certificate_key are inserted by certbot.

    # ── SSE-specific settings (CRITICAL for MCP over SSE) ────────────────────
    # SSE requires long-lived connections with no buffering.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;  # 24 hours — SSE connections are long-lived
    proxy_send_timeout 86400s;
    keepalive_timeout 86400s;

    # ── Proxy to Node.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Required for SSE — clear the Connection header to disable keep-alive upgrade
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SSE endpoint — extra headers for event streaming ─────────────────────
    location /sse {
        proxy_pass http://127.0.0.1:3001/sse;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # Tell nginx not to buffer SSE responses
        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
